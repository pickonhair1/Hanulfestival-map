<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>축제 부스 안내 예시</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 16px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .guide {
      margin: 0 0 16px;
      color: #555;
      font-size: 14px;
      line-height: 1.5;
    }

    .map-box {
      position: relative;
      width: 100%;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .map-box img {
      display: block;
      width: 100%;
      height: auto;
    }

    .booth-btn {
      position: absolute;
      left: 38%;
      top: 24%;
      width: 10%;
      height: 3%;
      border: 3px solid rgba(255, 255, 255, 0.95);
      background: rgba(255, 0, 150, 0.18);
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .booth-btn:hover,
    .booth-btn.active {
      background: rgba(255, 200, 0, 0.30);
      transform: scale(1.03);
    }

    .booth-btn span {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.92);
      padding: 4px 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
      pointer-events: none;
    }

    .info-card {
      margin-top: 18px;
      background: white;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    .info-card h2 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 8px 12px;
      font-size: 15px;
      line-height: 1.5;
    }

    .label {
      font-weight: 700;
      color: #444;
    }

    @media (max-width: 600px) {
      h1 { font-size: 20px; }
      .guide { font-size: 13px; }
      .info-grid {
        grid-template-columns: 72px 1fr;
        font-size: 14px;
      }
      .booth-btn span {
        font-size: 10px;
        padding: 3px 6px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>축제 부스 안내</h1>

    <div class="map-box">
      <img src="map.jpg" alt="축제 배치도" />

      <button class="booth-btn" id="foodTruckBtn">
        <span>총학부스</span>
      </button>
    </div>

    <div class="info-card" id="infoCard">
      <h2 id="boothName">정보를 알고싶으신 부스를 눌러주세요</h2>
      <div class="info-grid">
        <div class="label">위치</div>
        <div id="boothLocation">-</div>

        <div class="label">시간</div>
        <div id="boothTime">-</div>

        <div class="label">내용</div>
        <div id="boothDesc">-</div>

        <div class="label">메뉴</div>
        <div id="boothMenu">-</div>
      </div>
    </div>
  </div>

  <script>
    const boothInfo = {
        name: '총학부스',
        location: '운동장 위쪽',
        time: '8:00 ~ 22:00',
        desc: '총학생회 부스입니다',
        menu: '먹거리를 판매하지 않는 부스입니다'
};
    const button = document.getElementById('foodTruckBtn');
    const boothName = document.getElementById('boothName');
    const boothLocation = document.getElementById('boothLocation');
    const boothTime = document.getElementById('boothTime');
    const boothDesc = document.getElementById('boothDesc');
    const boothMenu = document.getElementById('boothMenu');

    button.addEventListener('click', () => {
      boothName.textContent = boothInfo.name;
      boothLocation.textContent = boothInfo.location;
      boothTime.textContent = boothInfo.time;
      boothDesc.textContent = boothInfo.desc;
      boothMenu.textContent = boothInfo.menu;
      button.classList.toggle('active');
    });
  </script>
</body>
</html>
